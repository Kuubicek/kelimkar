<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#212050" />
  <title>Stánkař – Potvrzení transakcí</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="https://www.msul.cz/wp-content/uploads/2023/02/logo-svg.svg" alt="Logo" class="logo" />
    <button id="btnLogout" class="logout-btn">Odhlásit se</button>
    <span id="userName" class="user-name">Načítám…</span>
  </header>

  <div class="container">
    <h1>Potvrzení transakcí</h1>
    <div id="status" class="status ok">Načítám…</div>
    <div class="table-container">
      <table id="tx-table" style="display:none;">
        <colgroup>
          <col style="width:50px" />
          <col style="width:150px" />
          <col style="width:150px" />
          <col style="width:100px" />
          <col style="width:80px" />
          <col style="width:80px" />
          <col style="width:200px" />
          <col style="width:100px" />
          <col style="width:80px" />
        </colgroup>
        <thead>
          <tr>
            <th>ID</th>
            <th>Kelímkař</th>
            <th>Stánkař</th>
            <th>Typ výměny</th>
            <th>Malých</th>
            <th>Velkých</th>
            <th>Čas</th>
            <th>Status</th>
            <th>Akce</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        // ✅ Kontrola session
        const user = await requireAuth();
        document.getElementById('userName').textContent = user.email;

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('service-worker.js').catch(console.error);
        }

        document.getElementById('btnLogout').addEventListener('click', async () => {
          await logout();
        });

        await loadForStankar();
      } catch (err) {
        console.error(err);
        window.location.href = 'index.html';
      }
    });

    async function loadForStankar() {
      const statusEl = document.getElementById('status');
      const table    = document.getElementById('tx-table');
      const tbody    = table.querySelector('tbody');
      tbody.innerHTML = '';

      try {
        const userRes = await fetch('/backend/api/session', { credentials: 'include' });
        const { user } = await userRes.json();
        const stand = user.email;

        const txRes = await fetch(
          `${window.SUPABASE_CONFIG.url}/rest/v1/transactions?stankar=eq.${encodeURIComponent(stand)}&order=timestamp.desc`,
          {
            headers: {
              apikey: window.SUPABASE_CONFIG.anonKey
            }
          }
        );
        const txs = await txRes.json();

        if (!txs.length) {
          statusEl.textContent = 'Žádné záznamy.';
          return;
        }

        statusEl.style.display = 'none';
        table.style.display    = 'table';

        txs.forEach(tx => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${tx.id}</td>
            <td>${tx.zamestnanec}</td>
            <td>${tx.stankar}</td>
            <td>${tx.typ_vymeny}</td>
            <td>${tx.male_kelimky}</td>
            <td>${tx.velke_kelimky}</td>
            <td>${new Date(tx.timestamp).toLocaleString('cs-CZ', {
              day: '2-digit', month: '2-digit', year: 'numeric',
              hour: '2-digit', minute: '2-digit', second: '2-digit'
            })}</td>
            <td>${tx.status}</td>
            <td>${
              tx.status === 'čeká'
                ? `<button class="confirm" data-id="${tx.id}">Potvrdit</button>`
                : ''
            }</td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll('button.confirm').forEach(b => {
          b.addEventListener('click', async () => {
            const id = b.dataset.id;
            b.disabled = true;
            await fetch(
              `${window.SUPABASE_CONFIG.url}/rest/v1/transactions?id=eq.${id}`,
              {
                method: 'PATCH',
                headers: {
                  apikey: window.SUPABASE_CONFIG.anonKey,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ status: 'potvrzeno' })
              }
            );
            const cell = b.closest('tr').querySelector('td:nth-child(8)');
            cell.textContent = 'potvrzeno';
            b.remove();
          });
        });

      } catch (e) {
        console.error(e);
        statusEl.textContent = '❌ ' + e.message;
        statusEl.className   = 'status error';
      }
    }
  </script>
</body>
</html>
