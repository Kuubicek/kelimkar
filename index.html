<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#212050" />
  <title>Kelímky App – Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="https://www.msul.cz/wp-content/uploads/2023/02/logo-svg.svg"
         alt="Logo Městských služeb"
         class="logo" />
  </header>

  <div class="login-container">
    <div class="login-box">
      <h1>Přihlášení</h1>
      <input type="email"    id="email"    placeholder="Email"    required />
      <input type="password" id="password" placeholder="Heslo"    required />
      <button id="btnLogin">Přihlásit se</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(console.error);
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const statusEl = document.getElementById('status');
      statusEl.textContent = '';

      if (!email || !password) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Vyplňte email i heslo';
        return;
      }

      try {
        const response = await fetch('/backend/api/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Přihlášení selhalo');
        }

        const { role } = await response.json();

        if (role === 'kelimkar')       window.location.href = 'kelimkar.html';
        else if (role === 'stankar')   window.location.href = 'stankar.html';
        else if (role === 'nadrizeny') window.location.href = 'nadrizeny.html';
        else throw new Error('Neznámá role');

      } catch (e) {
        console.error(e);
        statusEl.className = 'status error';
        statusEl.textContent = '❌ ' + e.message;
      }
    });
  </script>
</body>

</html>
